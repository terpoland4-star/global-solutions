    // 8. Newsletter Form Component (standalone)
    class NewsletterForm extends HTMLElement {
      connectedCallback() {
        this.innerHTML = `
          <form id="newsletter-form" class="flex flex-col sm:flex-row gap-3 w-full max-w-md">
            <input type="hidden" name="form-name" value="newsletter">
            <input type="hidden" name="bot-field">
            <input type="email" name="email" placeholder="votre@email.com" required class="newsletter-input flex-1">
            <button type="submit" class="btn-primary whitespace-nowrap">S'abonner</button>
            <div class="form-status text-sm"></div>
          </form>
        `;
        const form = this.querySelector('#newsletter-form');
        const statusDiv = this.querySelector('.form-status');
        form.addEventListener('submit', async (e) => {
          e.preventDefault();
          const email = form.querySelector('input[name="email"]').value;
          const btn = form.querySelector('button');
          btn.disabled = true;
          btn.innerText = 'Inscription…';
          try {
            const data = new URLSearchParams();
            data.append('form-name', 'newsletter');
            data.append('email', email);
            data.append('bot-field', '');
            const res = await fetch('/forms.html', {
              method: 'POST',
              headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
              body: data.toString()
            });
            if (res.ok) {
              statusDiv.innerHTML = '<span style="color:#86EFAC">✓ Merci — nous vous contacterons très vite.</span>';
              form.querySelector('input[name="email"]').value = '';
            } else throw new Error();
          } catch {
            statusDiv.innerHTML = '<span style="color:#FCA5A5">Une erreur s’est produite — veuillez réessayer.</span>';
          } finally {
            btn.disabled = false;
            btn.innerText = 'S’abonner';
            setTimeout(() => statusDiv.innerHTML = '', 5000);
          }
        });
      }
    }
    customElements.define('app-newsletter', NewsletterForm);
